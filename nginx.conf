events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;

    upstream frontend {
        server localhost:3005;
    }

    upstream backend {
        server localhost:3006;
    }

    # Redirect IP access to domain
    server {
        listen 80;
        server_name SERVER_IP;
        return 301 https://trendradar.cc$request_uri;
    }

    server {
        listen 443 ssl;
        server_name SERVER_IP;
        ssl_certificate /var/www/trendradar/ssl-certificates/fullchain.pem;
        ssl_certificate_key /var/www/trendradar/ssl-certificates/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        return 301 https://trendradar.cc$request_uri;
    }

    # HTTP to HTTPS redirects
    server {
        listen 80;
        server_name trendradar.cc www.trendradar.cc;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name api.trendradar.cc;
        return 301 https://$server_name$request_uri;
    }

    # Main site — trendradar.cc
    server {
        listen 443 ssl;
        server_name trendradar.cc www.trendradar.cc;

        ssl_certificate /var/www/trendradar/ssl-certificates/fullchain.pem;
        ssl_certificate_key /var/www/trendradar/ssl-certificates/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 50M;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API (path-based)
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            send_timeout 120s;
        }
    }

    # API subdomain — api.trendradar.cc
    server {
        listen 443 ssl;
        server_name api.trendradar.cc;

        ssl_certificate /var/www/trendradar/ssl-certificates/fullchain.pem;
        ssl_certificate_key /var/www/trendradar/ssl-certificates/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 50M;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            send_timeout 120s;
        }
    }
}
